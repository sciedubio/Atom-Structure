    <!-- CanvasRenderingContext2D.roundRect Polyfill (구형 브라우저 대응) -->
    <script>
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (typeof r === 'undefined') r = 0;
                if (Array.isArray(r)) r = r[0];
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            }
        }
    </script>

            5: { name: '붕소(B)', isotopes: {4: '붕소-9', 5: '붕소-10', 6: '붕소-11', 7: '붕소-12'}, stable: [5, 6], unstable: [4, 7] },
            6: { name: '탄소(C)', isotopes: {5: '탄소-11', 6: '탄소-12', 7: '탄소-13', 8: '탄소-14'}, stable: [6, 7], unstable: [5, 8] },
            7: { name: '질소(N)', isotopes: {6: '질소-13', 7: '질소-14', 8: '질소-15', 9: '질소-16'}, stable: [7, 8], unstable: [6, 9] },
            8: { name: '산소(O)', isotopes: {6: '산소-14', 7: '산소-15', 8: '산소-16', 9: '산소-17', 10: '산소-18'}, stable: [8, 9, 10], unstable: [6, 7] },
            9: { name: '플루오린(F)', isotopes: {10: '플루오린-19'}, stable: [10], unstable: [8, 9, 11] },
            10: { name: '네온(Ne)', isotopes: {10: '네온-20', 11: '네온-21', 12: '네온-22'}, stable: [10, 11, 12], unstable: [9, 13] },
            11: { name: '나트륨(Na)', isotopes: {12: '나트륨-23'}, stable: [12], unstable: [11, 13] },
            12: { name: '마그네슘(Mg)', isotopes: {12: '마그네슘-24', 13: '마그네슘-25', 14: '마그네슘-26'}, stable: [12, 13, 14], unstable: [11, 15] }
        };

        const QUIZ_POOL = [
            { q: "원자의 종류는 원자핵을 구성하는 양성자 수에 의해 결정된다.", a: true, explain: "양성자 수가 원자 번호를 결정하며, 이에 따라 원소의 종류가 달라집니다." },
            { q: "전자는 원자핵 속에 양성자와 함께 뭉쳐 있다.", a: false, explain: "전자는 원자핵 주위의 궤도(전자껍질)를 돌고 있습니다." },
            { q: "원자가 전기적으로 중성일 때, 양성자 수와 전자 수는 같다.", a: true, explain: "양성자의 (+)전하량과 전자의 (-)전하량이 같아야 중성이 됩니다." },
            { q: "중성자는 전하를 띠지 않는 입자이다.", a: true, explain: "중성자는 이름 그대로 전기적으로 중성(0)입니다." },
            { q: "전자는 양성자보다 질량이 훨씬 무겁다.", a: false, explain: "전자의 질량은 양성자의 약 1/1836로 매우 가볍습니다." },
            { q: "수소(H) 원자의 양성자 수는 1개이다.", a: true, explain: "수소는 원자 번호 1번으로 양성자가 1개 있습니다." },
            { q: "원자핵 전체는 (-) 전하를 띤다.", a: false, explain: "원자핵은 (+)전하를 띤 양성자와 전하가 없는 중성자로 구성되어 전체적으로 (+)전하를 띱니다." },
            { q: "동위원소는 양성자 수는 같지만 중성자 수가 다른 원소이다.", a: true, explain: "동위원소는 화학적 성질은 같으나 질량이 다른 특징을 가집니다." },
            { q: "모든 원자핵은 양성자와 중성자로 구성되어 있다.", a: false, explain: "가장 흔한 수소(수소-1)의 원자핵은 중성자 없이 양성자 1개로만 이루어져 있습니다." },
            { q: "원자가 전자를 잃으면 음이온이 된다.", a: false, explain: "전자는 (-)전하를 띠므로, 전자를 잃으면 전체적으로 (+)전하가 강해져 양이온이 됩니다." }
        ];

        // ==========================================
        // 2-1. Vanilla JS Engine: 2D Builder Core
        // ==========================================
        class AtomEngine2D {
            constructor(canvas, onStateUpdate) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.onStateUpdate = onStateUpdate;
                this.animationId = null;
                this.width = 0;
                this.height = 0;

                this.protons = [];
                this.neutrons = [];
                this.electrons = [];
                
                this.nucleusRadius = 30;
                this.shellRadii = [80, 140, 200, 260];
                this.maxElectronsPerShell = [2, 8, 8, 18];
                this.particleSize = 12;
                
                this.isDragging = false;
                this.dragParticle = null;
                this.dragOffset = {x:0, y:0};
                this.activeTouchId = null;

                this.baskets = {
                    proton: { type: 'proton', color: '#ef4444', label: '양성자 (+)' },
                    neutron: { type: 'neutron', color: '#64748b', label: '중성자 (0)' },
                    electron: { type: 'electron', color: '#06b6d4', label: '전자 (-)' }
                };

                this.init();
            }

            init() {
                this.resize();
                this.resizeObserver = new ResizeObserver(() => this.resize());
                this.resizeObserver.observe(this.canvas.parentElement);
                
                const handleDown = (e) => { 
                    if(e.cancelable) e.preventDefault(); 
                    if (e.changedTouches) {
                        if (this.activeTouchId !== null) return;
                        this.activeTouchId = e.changedTouches[0].identifier;
                    }
                    const pos = this.getEventPos(e); 
                    if(pos) this.onDown(pos.x, pos.y); 
                };
                const handleMove = (e) => { 
                    if(e.cancelable) e.preventDefault(); 
                    const pos = this.getEventPos(e); 
                    if(pos) this.onMove(pos.x, pos.y); 
                };
                const handleUp = (e) => { 
                    if(e.cancelable) e.preventDefault(); 
                    if (e.changedTouches) {
                        let match = Array.from(e.changedTouches).find(t => t.identifier === this.activeTouchId);
                        if (!match) return; 
                        this.activeTouchId = null;
                    }
                    this.onUp(); 
                };

                this.canvas.addEventListener('mousedown', handleDown);
                this.canvas.addEventListener('mousemove', handleMove);
                this.canvas.addEventListener('mouseup', handleUp);
                this.canvas.addEventListener('touchstart', handleDown, {passive: false});
                this.canvas.addEventListener('touchmove', handleMove, {passive: false});
                this.canvas.addEventListener('touchend', handleUp, {passive: false});

                this.start();
            }

            cleanup() { 
                cancelAnimationFrame(this.animationId); 
                if (this.resizeObserver) this.resizeObserver.disconnect();
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                
                if (this.width === rect.width && this.height === rect.height) return;

                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = rect.width * dpr;
                this.canvas.height = rect.height * dpr;
                this.ctx.scale(dpr, dpr);
                
                this.width = rect.width;
                this.height = rect.height;

                if (this.width === 0 || this.height === 0) return;

                const basketH = this.height < 400 ? 45 : 60;
                const basketW = Math.min(100, (this.width - 20) / 3.2);
                const startY = this.height - basketH - (this.height < 400 ? 10 : 20);
                const spacing = (this.width - (basketW * 3)) / 4;

                this.baskets.proton.x = spacing; this.baskets.proton.y = startY; this.baskets.proton.w = basketW; this.baskets.proton.h = basketH;
                this.baskets.neutron.x = spacing * 2 + basketW; this.baskets.neutron.y = startY; this.baskets.neutron.w = basketW; this.baskets.neutron.h = basketH;
                this.baskets.electron.x = spacing * 3 + basketW * 2; this.baskets.electron.y = startY; this.baskets.electron.w = basketW; this.baskets.electron.h = basketH;

                this.centerX = this.width / 2;
                this.centerY = (this.height - basketH - (this.height < 400 ? 20 : 40)) / 2;
                
                const minDim = Math.max(0.1, Math.min(this.width, this.height - basketH));
                this.shellRadii[0] = minDim * 0.12;
                this.shellRadii[1] = minDim * 0.22;
                this.shellRadii[2] = minDim * 0.32;
                this.shellRadii[3] = minDim * 0.42;
                this.nucleusRadius = minDim * 0.04;
                this.particleSize = minDim * 0.022;
            }

            getEventPos(e) {
                const rect = this.canvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    let touch = Array.from(e.touches).find(t => t.identifier === this.activeTouchId) || e.touches[0];
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                } else if (!e.touches) {
                    clientX = e.clientX;
                    clientY = e.clientY;
                } else {
                    return null;
                }
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            syncParticles(pCount, nCount, eCount) {
                if (this.protons.length === pCount && this.neutrons.length === nCount && this.electrons.length === eCount) return;

                while (this.protons.length < pCount) {
                    let p = { type: 'proton', id: Math.random() };
                    this.arrangeNucleusParticle(p);
                    this.protons.push(p);
                }
                while (this.protons.length > pCount) this.protons.pop();

                while (this.neutrons.length < nCount) {
                    let n = { type: 'neutron', id: Math.random() };
                    this.arrangeNucleusParticle(n);
                    this.neutrons.push(n);
                }
                while (this.neutrons.length > nCount) this.neutrons.pop();

                while (this.electrons.length < eCount) {
                    let e = { type: 'electron', shell: 0, id: Math.random() };
                    let targetShell = this.maxElectronsPerShell.length - 1; // Fallback for excess electrons
                    let currentCap = 0;
                    for (let i = 0; i < this.maxElectronsPerShell.length; i++) {
                        currentCap += this.maxElectronsPerShell[i];
                        if (this.electrons.length < currentCap) { targetShell = i; break; }
                    }
                    e.shell = targetShell;
                    this.electrons.push(e);
                }
                while (this.electrons.length > eCount) this.electrons.pop();

                this.recalculateElectronAngles();
            }

            onDown(x, y) {
                let clickedExisting = false;
                const allParticles = [...this.electrons, ...this.neutrons, ...this.protons];
                for (let i = allParticles.length - 1; i >= 0; i--) {
                    const p = allParticles[i];
                    const px = p.type === 'electron' ? p.visualX : p.x;
                    const py = p.type === 'electron' ? p.visualY : p.y;
                    
                    if (Math.hypot(x - px, y - py) < this.particleSize * 1.5) {
                        this.isDragging = true;
                        this.dragParticle = p;
                        this.dragOffset = { x: px - x, y: py - y };
                        
                        if (p.type === 'proton') this.protons = this.protons.filter(item => item !== p);
                        if (p.type === 'neutron') this.neutrons = this.neutrons.filter(item => item !== p);
                        if (p.type === 'electron') {
                            this.electrons = this.electrons.filter(item => item !== p);
                            this.recalculateElectronAngles();
                        }
                        this.updateReactState();
                        clickedExisting = true;
                        break;
                    }
                }

                if (!clickedExisting) {
                    for (const key in this.baskets) {
                        const b = this.baskets[key];
                        if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
                            this.isDragging = true;
                            this.dragParticle = { type: b.type, x: x, y: y, visualX: x, visualY: y, id: Math.random() };
                            this.dragOffset = {x: 0, y: 0};
                            break;
                        }
                    }
                }
            }

            onMove(x, y) {
                if (this.isDragging && this.dragParticle) {
                    this.dragParticle.x = x + this.dragOffset.x;
                    this.dragParticle.y = y + this.dragOffset.y;
                    this.dragParticle.visualX = this.dragParticle.x;
                    this.dragParticle.visualY = this.dragParticle.y;
                }
            }

            onUp() {
                if (this.isDragging && this.dragParticle) {
                    const distToCenter = Math.hypot(this.dragParticle.x - this.centerX, this.dragParticle.y - this.centerY);
                    
                    if (this.dragParticle.type === 'proton' || this.dragParticle.type === 'neutron') {
                        if (distToCenter < this.nucleusRadius * 3 && (this.protons.length + this.neutrons.length) < 40) {
                            this.arrangeNucleusParticle(this.dragParticle);
                            if (this.dragParticle.type === 'proton') this.protons.push(this.dragParticle);
                            if (this.dragParticle.type === 'neutron') this.neutrons.push(this.dragParticle);
                        }
                    } else if (this.dragParticle.type === 'electron') {
                        const maxE = this.maxElectronsPerShell.reduce((a,b)=>a+b,0);
                        const outermostRadius = this.shellRadii[this.shellRadii.length - 1];
                        if (distToCenter < outermostRadius + 40 && this.electrons.length < maxE) {
                            let targetShell = this.maxElectronsPerShell.length - 1;
                            let currentCount = 0;
                            for (let i = 0; i < this.maxElectronsPerShell.length; i++) {
                                currentCount += this.maxElectronsPerShell[i];
                                if (this.electrons.length < currentCount) { targetShell = i; break; }
                            }
                            this.dragParticle.shell = targetShell;
                            this.electrons.push(this.dragParticle);
                            this.recalculateElectronAngles();
                        }
                    }
                    this.updateReactState();
                }
                this.isDragging = false;
                this.dragParticle = null;
            }

            arrangeNucleusParticle(p) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * this.nucleusRadius;
                p.x = this.centerX + Math.cos(angle) * r;
                p.y = this.centerY + Math.sin(angle) * r;
            }

            recalculateElectronAngles() {
                let counts = new Array(this.maxElectronsPerShell.length).fill(0);
                this.electrons.forEach(e => { e.shellIndex = counts[e.shell]; counts[e.shell]++; });
                this.electrons.forEach(e => { e.baseAngle = counts[e.shell] > 0 ? (Math.PI * 2 / counts[e.shell]) * e.shellIndex : 0; });
            }

            updateReactState() {
                if (this.onStateUpdate) {
                    this.onStateUpdate(this.protons.length, this.neutrons.length, this.electrons.length);
                }
            }

            start() {
                const loop = (timestamp) => {
                    this.update(timestamp);
                    this.draw();
                    this.animationId = requestAnimationFrame(loop);
                };
                this.animationId = requestAnimationFrame(loop);
            }

            update(timestamp) {
                const speed = timestamp * 0.001;
                this.electrons.forEach(e => {
                    const radius = this.shellRadii[e.shell];
                    const angle = e.baseAngle + speed * (1 / (e.shell + 1));
                    e.visualX = this.centerX + Math.cos(angle) * radius;
                    e.visualY = this.centerY + Math.sin(angle) * radius;
                });
            }

            draw() {
                if (this.width === 0 || this.height === 0) return;

                this.ctx.clearRect(0, 0, this.width, this.height);

                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                this.ctx.lineWidth = 2;
                this.ctx.setLineDash([5, 5]);
                for (let r of this.shellRadii) {
                    this.ctx.beginPath(); this.ctx.arc(this.centerX, this.centerY, r, 0, Math.PI * 2); this.ctx.stroke();
                }
                this.ctx.setLineDash([]);

                for (const key in this.baskets) {
                    const b = this.baskets[key];
                    const isSmallH = this.height < 400;
                    const isSmallW = this.width < 400;
                    
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.05)'; this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    this.ctx.lineWidth = 1;
                    this.ctx.roundRect(b.x, b.y, b.w, b.h, 10); this.ctx.fill(); this.ctx.stroke();
                    
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; 
                    this.ctx.font = (isSmallW ? 11 : 14) + 'px "Noto Sans KR"';
                    this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + (isSmallH ? 12 : 15));
                    this.drawParticle(b.x + b.w/2, b.y + b.h/2 - (isSmallH ? 8 : 10), b.type, true);
                }

                const gradient = this.ctx.createRadialGradient(this.centerX, this.centerY, 0, this.centerX, this.centerY, this.nucleusRadius*2);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.05)'); gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                this.ctx.fillStyle = gradient;
                this.ctx.beginPath(); this.ctx.arc(this.centerX, this.centerY, this.nucleusRadius*2, 0, Math.PI*2); this.ctx.fill();

                this.neutrons.forEach(p => this.drawParticle(p.x, p.y, p.type));
                this.protons.forEach(p => this.drawParticle(p.x, p.y, p.type));
                this.electrons.forEach(p => this.drawParticle(p.visualX, p.visualY, p.type));

                if (this.isDragging && this.dragParticle) {
                    this.ctx.shadowBlur = 15; this.ctx.shadowColor = this.baskets[this.dragParticle.type].color;
                    this.drawParticle(this.dragParticle.x, this.dragParticle.y, this.dragParticle.type);
                    this.ctx.shadowBlur = 0;
                }
            }

            drawParticle(x, y, type, isIcon=false) {
                if (!isFinite(x) || !isFinite(y)) return;

                const colorMap = { proton: '#ef4444', neutron: '#64748b', electron: '#06b6d4' };
                const symbolMap = { proton: '+', neutron: '0', electron: '-' };
                const size = isIcon ? this.particleSize * 1.2 : this.particleSize;

                this.ctx.fillStyle = colorMap[type];
                this.ctx.beginPath(); this.ctx.arc(x, y, size, 0, Math.PI * 2); this.ctx.fill();

                const grad = this.ctx.createRadialGradient(x - size*0.3, y - size*0.3, size*0.1, x, y, size);
                grad.addColorStop(0, 'rgba(255,255,255,0.6)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
                this.ctx.fillStyle = grad; this.ctx.fill();
                this.ctx.strokeStyle = 'rgba(0,0,0,0.3)'; this.ctx.lineWidth = 1; this.ctx.stroke();

                this.ctx.fillStyle = 'white'; this.ctx.font = `bold ${size}px Arial`;
                this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
                this.ctx.fillText(symbolMap[type], x, y + size*0.1);
            }
        }

        // ==========================================
        // 2-2. WebGL(Three.js) Engine: 3D Core
        // ==========================================
        class AtomEngine3D {
            constructor(container) {
                this.container = container;
                this.scene = new THREE.Scene();
                this.scene.background = null; 
                
                this.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
                this.camera.position.z = 450;
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(100, 200, 300);
                this.scene.add(dirLight);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.container.appendChild(this.renderer.domElement);

                this.atomGroup = new THREE.Group();
                this.scene.add(this.atomGroup);
                this.nucleusGroup = new THREE.Group();
                this.atomGroup.add(this.nucleusGroup);

                this.electrons = [];
                this.orbits = [];
                this.particleSize = 14;
                this.orbitRadius = 150;

                this.isDragging = false;
                this.targetRotationX = 0;
                this.targetRotationY = 0;
                this.previousMousePosition = { x: 0, y: 0 };
                
                // 메모리 누수 방지를 위한 공유 Material/Geometry 캐싱
                this.matProton = new THREE.MeshPhongMaterial({ color: 0xef4444, shininess: 80 });
                this.matNeutron = new THREE.MeshPhongMaterial({ color: 0x64748b, shininess: 80 });
                this.matElectron = new THREE.MeshPhongMaterial({ color: 0x06b6d4, shininess: 100 });
                this.geoNucleon = new THREE.SphereGeometry(this.particleSize, 32, 32);
                this.geoElectron = new THREE.SphereGeometry(this.particleSize * 0.5, 16, 16);
                this.orbitMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
                this.orbitGeometry = null; 

                this.onUpHandler = this.onUp.bind(this);
                this.setupEvents();

                this.currentP = -1; this.currentN = -1; this.currentE = -1;

                this.animate = this.animate.bind(this);
                this.animationId = requestAnimationFrame(this.animate);
            }

            setupEvents() {
                const onDown = (e) => {
                    this.isDragging = true;
                    this.previousMousePosition = { x: e.clientX || e.touches?.[0].clientX, y: e.clientY || e.touches?.[0].clientY };
                };
                const onMove = (e) => {
                    if (this.isDragging) {
                        const cx = e.touches ? e.touches[0].clientX : e.clientX;
                        const cy = e.touches ? e.touches[0].clientY : e.clientY;
                        this.targetRotationX += (cx - this.previousMousePosition.x) * 0.01;
                        this.targetRotationY += (cy - this.previousMousePosition.y) * 0.01;
                        this.previousMousePosition = { x: cx, y: cy };
                    }
                };

                this.renderer.domElement.addEventListener('mousedown', onDown);
                this.renderer.domElement.addEventListener('mousemove', onMove);
                
                window.addEventListener('mouseup', this.onUpHandler);
                window.addEventListener('touchend', this.onUpHandler);
                
                this.renderer.domElement.addEventListener('touchstart', onDown, {passive: false});
                this.renderer.domElement.addEventListener('touchmove', onMove, {passive: false});

                this.resizeHandler = () => {
                    if(!this.container || this.container.clientWidth === 0 || this.container.clientHeight === 0) return;
                    this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                };
                
                this.resizeObserver = new ResizeObserver(this.resizeHandler);
                this.resizeObserver.observe(this.container);
            }

            onUp() {
                this.isDragging = false;
            }

            cleanup() {
                cancelAnimationFrame(this.animationId);
                
                window.removeEventListener('mouseup', this.onUpHandler);
                window.removeEventListener('touchend', this.onUpHandler);

                if (this.resizeObserver) this.resizeObserver.disconnect();
                
                // 완벽한 메모리 해제
                this.matProton.dispose();
                this.matNeutron.dispose();
                this.matElectron.dispose();
                this.geoNucleon.dispose();
                this.geoElectron.dispose();
                this.orbitMaterial.dispose();
                if (this.orbitGeometry) this.orbitGeometry.dispose();

                if (this.renderer) {
                    if(this.renderer.domElement && this.renderer.domElement.parentNode) {
                        this.renderer.domElement.parentNode.removeChild(this.renderer.domElement);
                    }
                    this.renderer.dispose();
                }
            }

            syncParticles(pCount, nCount, eCount) {
                if (this.currentP === pCount && this.currentN === nCount && this.currentE === eCount) return;
                this.currentP = pCount; this.currentN = nCount; this.currentE = eCount;

                while(this.nucleusGroup.children.length > 0) {
                    let child = this.nucleusGroup.children[0];
                    this.nucleusGroup.remove(child);
                }
                
                this.electrons.forEach(e => this.atomGroup.remove(e));
                this.electrons = [];
                this.orbits.forEach(o => this.atomGroup.remove(o));
                this.orbits = [];

                const totalNucleons = pCount + nCount;
                if (totalNucleons > 0) {
                    let radius = this.particleSize;
                    if (totalNucleons > 1) radius = this.particleSize * Math.pow(totalNucleons, 1/3) * 0.6;

                    const nucleons = new Array(totalNucleons).fill('n');
                    if (pCount > 0) {
                        const step = totalNucleons / pCount;
                        for (let i = 0; i < pCount; i++) {
                            let index = Math.floor(i * step);
                            if(index < totalNucleons) nucleons[index] = 'p';
                        }
                    }

                    const phi = Math.PI * (3 - Math.sqrt(5));
                    if (totalNucleons === 1) {
                        const mesh = new THREE.Mesh(this.geoNucleon, nucleons[0] === 'p' ? this.matProton : this.matNeutron);
                        this.nucleusGroup.add(mesh);
                    } else {
                        nucleons.forEach((type, i) => {
                            const offset = 2.0 / totalNucleons;
                            const y = 1.0 - (i * offset) - (offset / 2.0);
                            const r = Math.sqrt(1 - y * y);
                            const theta = phi * i;
                            const mesh = new THREE.Mesh(this.geoNucleon, type === 'p' ? this.matProton : this.matNeutron);
                            mesh.position.set(
                                Math.cos(theta) * r * radius + (Math.random() - 0.5) * 1.5,
                                y * radius + (Math.random() - 0.5) * 1.5,
                                Math.sin(theta) * r * radius + (Math.random() - 0.5) * 1.5
                            );
                            this.nucleusGroup.add(mesh);
                        });
                    }
                }

                if (this.orbitGeometry) this.orbitGeometry.dispose();
                const orbitPoints = [];
                for (let j = 0; j <= 64; j++) {
                    const angle = (j / 64) * Math.PI * 2;
                    orbitPoints.push(new THREE.Vector3(Math.cos(angle) * this.orbitRadius, Math.sin(angle) * this.orbitRadius, 0));
                }
                this.orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);

                const maxEPerShell = [2, 8, 8, 18];
                const shellScales = [0.4, 0.7, 1.0, 1.3];

                for (let i = 0; i < eCount; i++) {
                    let targetShell = maxEPerShell.length - 1;
                    let currentCap = 0;
                    for (let s = 0; s < maxEPerShell.length; s++) {
                        currentCap += maxEPerShell[s];
                        if (i < currentCap) { targetShell = s; break; }
                    }

                    const orbit = new THREE.LineLoop(this.orbitGeometry, this.orbitMaterial);
                    const scale = shellScales[targetShell];
                    orbit.scale.set(scale, scale, scale);
                    orbit.rotation.x = Math.random() * Math.PI;
                    orbit.rotation.y = Math.random() * Math.PI;
                    this.atomGroup.add(orbit);
                    this.orbits.push(orbit);

                    const electron = new THREE.Mesh(this.geoElectron, this.matElectron);
                    electron.userData = { 
                        angle: Math.random() * Math.PI * 2, 
                        speed: (0.02 - targetShell * 0.003) + Math.random() * 0.005, 
                        orbit: orbit,
                        radius: this.orbitRadius * scale
                    };
                    this.atomGroup.add(electron);
                    this.electrons.push(electron);
                }
            }

            animate() {
                this.animationId = requestAnimationFrame(this.animate);
                this.atomGroup.rotation.y += (this.targetRotationX - this.atomGroup.rotation.y) * 0.1;
                this.atomGroup.rotation.x += (this.targetRotationY - this.atomGroup.rotation.x) * 0.1;

                this.electrons.forEach(electron => {
                    electron.userData.angle += electron.userData.speed;
                    const angle = electron.userData.angle;
                    const orbit = electron.userData.orbit;
                    const localPos = new THREE.Vector3(Math.cos(angle) * electron.userData.radius, Math.sin(angle) * electron.userData.radius, 0);
                    localPos.applyEuler(orbit.rotation); 
                    electron.position.copy(localPos);
                });
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==========================================
        // 3. React Components (UI Wrapper)
        // ==========================================
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const getIsotopeInfo = (p, n) => {
            if (p === 0) return { name: '입자 없음', symbol: '?', isotope: '-', stability: '-', color: 'text-gray-400' };
            const elem = ELEMENTS[p] || { name: '무거운 원소', symbol: '?' };
            let isotope = `${elem.name}-${p+n}`;
            let stability = '정보 없음';
            let color = 'text-white';

            if (ISOTOPE_DATA[p]) {
                const data = ISOTOPE_DATA[p];
                if (data.isotopes[n]) isotope = data.isotopes[n];
                if (data.stable.includes(n)) { stability = '안정적 (자연계 존재)'; color = 'text-green-400'; }
                else if (data.unstable.includes(n)) { stability = '불안정 (방사성 붕괴)'; color = 'text-orange-400'; }
                else { stability = '존재 확률 극히 낮음'; color = 'text-red-500'; }
            } else if (p < ELEMENTS.length) {
                const ratio = n / p;
                if (ratio >= 1.0 && ratio <= 1.3) { stability = '안정적 (추정)'; color = 'text-green-400'; }
                else { stability = '불안정 (추정)'; color = 'text-orange-400'; }
            }
            return { name: elem.name, symbol: elem.symbol, isotope, stability, color };
        };

        // --- Main App Component ---
        const App = () => {

            return (
                <div className="relative w-full overflow-hidden flex flex-col font-sans select-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black" style={{ height: 'calc(var(--vh, 1vh) * 100)' }}>
                    <div className="absolute inset-0 z-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle, #ffffff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                    
                    <button onClick={() => setIsGuideOpen(true)} className="absolute right-4 z-[70] text-white/50 hover:text-white text-sm flex items-center gap-1 glass-panel px-3 py-1.5 rounded-full transition-all shadow-md" style={{ top: 'max(16px, var(--safe-top))' }} aria-label="관리자 가이드 모달 열기">
                        ⚙️ DB 연동 가이드
                    </button>

                    <div className="relative z-10 w-full h-full flex flex-col items-center justify-center">
                        {view === 'intro' && <IntroView onStart={() => setView('simulation')} />}
                        {view === 'simulation' && <SimulationView state={atomState} setState={setAtomState} onReport={() => setView('report')} showAlert={(msg)=>setAlertData({isOpen: true, msg})} stats={simStats} />}
                        {view === 'report' && <ReportView state={atomState} info={studentInfo} setInfo={setStudentInfo} quizzes={quizzes} answers={answers} setAnswers={setAnswers} onSubmit={submitData} onBack={() => setView('simulation')} />}
                        {view === 'done' && <DoneView onReset={resetSimulation} />}
                    </div>

                    {isSubmitting && (
                        <div className="fixed inset-0 z-[200] bg-black/80 flex flex-col items-center justify-center backdrop-blur-sm">
                            <div className="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
                            <div className="mt-4 text-white font-bold tracking-widest animate-pulse text-lg">데이터 전송 중...</div>
                        </div>
                    )}
                    <AlertModal isOpen={alertData.isOpen} message={alertData.msg} onClose={() => setAlertData({ isOpen: false, msg: '' })} />
                    <AdminGuideModal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} />
                </div>
            );
        };

        // --- View 1: Intro ---
        const IntroView = ({ onStart }) => (
            <div className="flex flex-col items-center justify-center p-6 w-full max-w-2xl text-center scrollable-panel overflow-y-auto" style={{ paddingBottom: 'max(24px, var(--safe-bottom))' }}>
                <div className="relative w-48 h-48 mb-8 animate-spin-slow">
                    <svg viewBox="0 0 100 100" className="w-full h-full text-primary opacity-80 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        <circle cx="50" cy="50" r="10" fill="currentColor" />
                        <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(30 50 50)" />
                        <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(90 50 50)" />
                        <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="currentColor" strokeWidth="2" transform="rotate(150 50 50)" />
                        <circle cx="85" cy="65" r="4" fill="#06b6d4" className="animate-pulse" />
                        <circle cx="15" cy="35" r="4" fill="#06b6d4" className="animate-pulse" style={{animationDelay: '0.5s'}} />
                    </svg>
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 mb-4 drop-shadow-lg">직접 빚어내는 원자</h1>
                <p className="text-gray-300 mb-8 text-lg md:text-xl font-light">나만의 원자를 자유롭게 만들거나,<br/>미션에 도전하여 원자의 비밀을 완벽하게 파헤쳐보세요!</p>
                <button onClick={onStart} className="glass-button px-10 py-4 rounded-full text-xl font-bold tracking-wide w-full md:w-auto shadow-[0_0_20px_rgba(59,130,246,0.4)]">실험 시작하기</button>
                <div className="absolute bottom-6 text-white/30 text-xs font-mono tracking-widest" style={{ bottom: 'max(24px, var(--safe-bottom))' }}>Created by Yang DH</div>
            </div>
        );

        // --- View 2: Simulation (Hybrid 2D/3D + Tab System) ---
        const SimulationView = ({ state, setState, onReport, showAlert, stats }) => {
            const canvas2DRef = useRef(null);
            const container3DRef = useRef(null);
            const engine2DRef = useRef(null);
            const engine3DRef = useRef(null);
            
            const [viewMode, setViewMode] = useState('2D'); 
            const [simMode, setSimMode] = useState('sandbox'); 
            
            const [missions, setMissions] = useState([]);
            const [missionIndex, setMissionIndex] = useState(0);
            const [revealedCells, setRevealedCells] = useState({});

            useEffect(() => {
                if (canvas2DRef.current && !engine2DRef.current) {
                    engine2DRef.current = new AtomEngine2D(canvas2DRef.current, (p, n, e) => {
                        setState({ protons: p, neutrons: n, electrons: e });
                    });
                }
                if (container3DRef.current && !engine3DRef.current) {
                    engine3DRef.current = new AtomEngine3D(container3DRef.current);
                }
                return () => { engine2DRef.current?.cleanup(); engine3DRef.current?.cleanup(); };
            }, []);

            useEffect(() => {
                if (engine2DRef.current) engine2DRef.current.syncParticles(state.protons, state.neutrons, state.electrons);
                if (engine3DRef.current) engine3DRef.current.syncParticles(state.protons, state.neutrons, state.electrons);
            }, [state]);

            useEffect(() => {
                const generateMissions = () => {
                    const targets = [];
                    const used = new Set();
                    while(targets.length < 3) {
                        const p = Math.floor(Math.random() * 12) + 1; 
                        if (!used.has(p)) {
                            used.add(p);
                            let n = p; 
                            if (ISOTOPE_DATA[p] && ISOTOPE_DATA[p].stable.length > 0) {
                                n = ISOTOPE_DATA[p].stable[0]; 
                            }
                            targets.push({ p, n, e: p, name: ELEMENTS[p].name, symbol: ELEMENTS[p].symbol, completed: false });
                        }
                    }
                    setMissions(targets);
                };
                generateMissions();
            }, []);

            const updateParticle = (type, delta) => {
                setState(prev => {
                    const next = { ...prev };
                    if (type === 'p') next.protons = Math.max(0, Math.min(20, next.protons + delta));
                    if (type === 'n') next.neutrons = Math.max(0, Math.min(30, next.neutrons + delta));
                    if (type === 'e') next.electrons = Math.max(0, Math.min(20, next.electrons + delta));
                    return next;
                });
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(()=>{});
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const checkMission = () => {
                if (!missions[missionIndex]) return;
                const m = missions[missionIndex];
                
                const isStable = ISOTOPE_DATA[m.p] ? ISOTOPE_DATA[m.p].stable.includes(state.neutrons) : (state.neutrons >= m.p && state.neutrons <= m.p + 2);
                
                if (state.protons === m.p && state.electrons === m.e && isStable) {
                    const newMissions = [...missions];
                    newMissions[missionIndex].completed = true;
                    setMissions(newMissions);
                    
                    if (missionIndex < 2) {
                        showAlert(`🎉 정답입니다!\n다음 원소를 만들어 보세요.`);
                        setMissionIndex(missionIndex + 1);
                        setState({ protons: 0, neutrons: 0, electrons: 0 }); 
                    } else {
                        showAlert(`🏆 축하합니다!\n모든 미션을 완수했습니다.\n결과 표 탭이 잠금 해제되었습니다!`);
                        setSimMode('table');
                    }
                } else {
                    let msg = "❌ 아직 정답이 아닙니다.\n\n";
                    if (state.protons !== m.p) msg += `- 양성자 수는 원자 번호(${m.p})와 같아야 합니다.\n`;
                    if (!isStable) msg += `- 중성자 수를 조절하여 안정한 원자핵을 만드세요.\n`;
                    if (state.electrons !== m.e) msg += `- 중성 원자는 전자 수와 양성자 수가 같습니다.`;
                    showAlert(msg);
                }
            };

            const revealCell = (id) => {
                setRevealedCells(prev => ({...prev, [id]: true}));
            };

            const info = getIsotopeInfo(state.protons, state.neutrons);
            const netCharge = state.protons - state.electrons;
            const glowClass = netCharge > 0 ? 'shadow-[inset_0_0_100px_rgba(239,68,68,0.15)]' : netCharge < 0 ? 'shadow-[inset_0_0_100px_rgba(6,182,212,0.15)]' : '';
            const allMissionsComplete = missions.length > 0 && missions.every(m => m.completed);

            return (
                <div className={`w-full h-full flex flex-col md:flex-row overflow-hidden relative transition-all duration-700 ${glowClass}`}>
                    
                    {/* Left Control Panel */}
                    <div className={`md:w-80 w-full ${simMode === 'table' ? 'absolute opacity-0 pointer-events-none' : 'h-[55%] md:h-full relative opacity-100'} px-4 pt-4 pb-0 flex flex-col gap-4 z-20 overflow-y-auto scrollable-panel custom-scrollbar flex-shrink-0 order-2 md:order-1 transition-opacity`}>
                        
                        <div className="flex bg-black/40 rounded-xl p-1 shrink-0 shadow-inner">
                            <button onClick={()=>setSimMode('sandbox')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${simMode==='sandbox'?'bg-primary text-white shadow-md':'text-gray-400 hover:text-white'}`}>자유 탐구</button>
                            <button onClick={()=>setSimMode('mission')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${simMode==='mission'?'bg-secondary text-white shadow-md':'text-gray-400 hover:text-white'}`}>미션 도전</button>
                            <button onClick={()=>{ if(allMissionsComplete) setSimMode('table'); else showAlert("모든 미션을 완료해야 표를 볼 수 있습니다."); }} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${simMode==='table'?'bg-green-500 text-white shadow-md':'text-gray-400 hover:text-white'}`}>결과 표 {allMissionsComplete?'':'🔒'}</button>
                        </div>

                        {simMode === 'sandbox' && (
                            <div className="glass-panel p-5 rounded-2xl flex flex-col relative overflow-hidden shrink-0 animate-fade-in">
                                <div className="absolute -right-4 -top-4 text-8xl font-black text-white/5 pointer-events-none">{info.symbol}</div>
                                <h2 className="text-gray-400 text-sm font-bold mb-1">현재 원소 (자유 탐구)</h2>
                                <div className="text-3xl font-black text-white mb-1 drop-shadow-md">{info.isotope}</div>
                                <div className={`text-sm font-bold ${info.color}`}>{info.stability}</div>
                                {stats.maxProtons > 0 && (
                                    <div className="mt-2 pt-2 border-t border-white/10 text-xs text-gray-500 flex justify-between">
                                        <span>관측 최소 번호: {stats.minProtons === Infinity ? 0 : stats.minProtons}</span>
                                        <span>관측 최대 번호: {stats.maxProtons}</span>
                                    </div>
                                )}
                            </div>
                        )}

                        {simMode === 'mission' && missions.length > 0 && (
                            <div className="glass-panel p-5 rounded-2xl flex flex-col relative overflow-hidden border border-secondary/50 shrink-0 animate-fade-in">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-secondary font-bold text-lg">미션 {missionIndex + 1} / 3</h2>
                                    <span className="text-xs bg-secondary/20 text-secondary px-2 py-1 rounded-full">{missions.filter(m=>m.completed).length}/3 완료</span>
                                </div>
                                <p className="text-white font-bold mb-2 leading-tight">
                                    <span className="text-2xl text-blue-300 block mb-1">{missions[missionIndex].name}</span> 중성 원자 만들기
                                </p>
                                <p className="text-gray-300 text-xs mb-4 leading-relaxed">
                                    - 원자 번호: {missions[missionIndex].p}번<br/>
                                    - 힌트: 가장 안정한 중성자 수는 {missions[missionIndex].n}개<br/>
                                    <span className="text-blue-300 mt-1 inline-block">💡 팁: 바구니에서 드래그하거나 버튼을 눌러보세요.</span>
                                </p>
                                <button onClick={checkMission} className="glass-button w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-500 shadow-lg text-sm">
                                    이 모형으로 정답 확인 ✔️
                                </button>
                            </div>
                        )}

                        <div className="glass-panel p-5 rounded-2xl shrink-0">
                            <h3 className="text-gray-400 mb-3 text-sm font-bold">입자 구성 제어</h3>
                            
                            <div className="flex justify-between items-center mb-3">
                                <span className="flex items-center gap-2 text-red-400"><span className="w-3 h-3 rounded-full bg-red-500"></span>양성자</span>
                                <div className="flex items-center gap-3">
                                    <button aria-label="양성자 줄이기" className="ctrl-btn text-white" onClick={()=>updateParticle('p', -1)} disabled={state.protons <= 0}>-</button>
                                    <span className="font-mono text-xl w-6 text-center text-white">{state.protons}</span>
                                    <button aria-label="양성자 늘리기" className="ctrl-btn text-white" onClick={()=>updateParticle('p', 1)} disabled={state.protons >= 20}>+</button>
                                </div>
                            </div>
                            
                            <div className="flex justify-between items-center mb-3">
                                <span className="flex items-center gap-2 text-slate-400"><span className="w-3 h-3 rounded-full bg-slate-500"></span>중성자</span>
                                <div className="flex items-center gap-3">
                                    <button aria-label="중성자 줄이기" className="ctrl-btn text-white" onClick={()=>updateParticle('n', -1)} disabled={state.neutrons <= 0}>-</button>
                                    <span className="font-mono text-xl w-6 text-center text-white">{state.neutrons}</span>
                                    <button aria-label="중성자 늘리기" className="ctrl-btn text-white" onClick={()=>updateParticle('n', 1)} disabled={state.neutrons >= 30}>+</button>
                                </div>
                            </div>

                            <div className="flex justify-between items-center">
                                <span className="flex items-center gap-2 text-cyan-400"><span className="w-3 h-3 rounded-full bg-cyan-500"></span>전자</span>
                                <div className="flex items-center gap-3">
                                    <button aria-label="전자 줄이기" className="ctrl-btn text-white" onClick={()=>updateParticle('e', -1)} disabled={state.electrons <= 0}>-</button>
                                    <span className="font-mono text-xl w-6 text-center text-white">{state.electrons}</span>
                                    <button aria-label="전자 늘리기" className="ctrl-btn text-white" onClick={()=>updateParticle('e', 1)} disabled={state.electrons >= 20}>+</button>
                                </div>
                            </div>
                        </div>

                        <div className="glass-panel p-5 rounded-2xl shrink-0">
                            <h3 className="text-gray-400 mb-3 text-sm font-bold flex items-center gap-2">⚡ 전하량 실시간 계산</h3>
                            <div className="bg-black/30 p-3 rounded-xl space-y-2 text-sm text-gray-300">
                                <div className="flex justify-between items-center">
                                    <span>원자핵 전하 : <span className="text-red-400">(+1)</span> × {state.protons}</span>
                                    <span className="font-bold text-red-400">+{state.protons}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span>전자 전하 : <span className="text-cyan-400">(-1)</span> × {state.electrons}</span>
                                    <span className="font-bold text-cyan-400">-{state.electrons}</span>
                                </div>
                                <div className="h-px w-full bg-white/20 my-1"></div>
                                <div className="flex justify-between items-center text-lg text-white">
                                    <span>총 전하량</span>
                                    <span className={`font-black ${netCharge > 0 ? 'text-red-400' : netCharge < 0 ? 'text-cyan-400' : 'text-green-400'}`}>
                                        {netCharge > 0 ? '+' : ''}{netCharge}
                                    </span>
                                </div>
                            </div>
                            <div className="mt-3 text-center">
                                <span className={`px-4 py-1 rounded-full text-sm font-bold bg-white/10 ${netCharge > 0 ? 'text-red-400' : netCharge < 0 ? 'text-cyan-400' : 'text-white'}`}>
                                    상태: {netCharge > 0 ? '양이온' : netCharge < 0 ? '음이온' : '중성 원자'}
                                </span>
                            </div>
                        </div>
                        
                        <div className="mt-auto shrink-0 sticky bottom-0 bg-[#0f172a]/90 backdrop-blur-md pt-2 pb-4 -mx-4 px-4 z-30 shadow-[0_-10px_20px_rgba(15,23,42,0.8)]" style={{ paddingBottom: 'max(16px, var(--safe-bottom))' }}>
                            <button onClick={onReport} className="glass-button w-full py-4 rounded-xl font-bold text-white shadow-lg text-lg tracking-wide">최종 보고서 작성 📝</button>
                        </div>
                    </div>

                    {/* Right Canvas Area / Table Overlay */}
                    <div className={`w-full ${simMode === 'table' ? 'h-full flex-1' : 'min-h-[280px] h-[45%] md:h-full md:flex-1'} relative overflow-hidden order-1 md:order-2 touch-none-area`}>
                        
                        {/* 캔버스 상단 UI (우측 가이드 버튼과의 겹침 방지를 위해 좌측으로 그룹화하여 배치) */}
                        <div className={`absolute left-4 right-[140px] z-50 flex flex-wrap gap-2 pointer-events-none transition-opacity ${simMode === 'table' ? 'opacity-0' : 'opacity-100'}`} style={{ top: 'max(16px, var(--safe-top))' }}>
                            <button onClick={()=>setViewMode('2D')} className={`pointer-events-auto px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-md ${viewMode==='2D'?'bg-blue-500 text-white':'bg-white/10 text-gray-300 hover:bg-white/20'}`}>2D 빌더</button>
                            <button onClick={()=>setViewMode('3D')} className={`pointer-events-auto px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-md ${viewMode==='3D'?'bg-purple-500 text-white':'bg-white/10 text-gray-300 hover:bg-white/20'}`}>3D 뷰어</button>
                            <button onClick={()=>setState({protons:0, neutrons:0, electrons:0})} className="pointer-events-auto bg-white/20 hover:bg-white/30 border border-white/20 px-3 py-2 rounded-lg font-bold text-sm text-white transition-all shadow-md whitespace-nowrap">초기화 ↺</button>
                            <button aria-label="전체화면 전환" onClick={toggleFullscreen} className="pointer-events-auto bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg font-bold text-sm text-white transition-all shadow-md hidden sm:block">⛶</button>
                        </div>

                        {/* Table View Overlay */}
                        {simMode === 'table' && (
                            <div className="absolute inset-0 z-40 bg-darkBg/95 backdrop-blur-xl p-4 md:p-10 overflow-y-auto scrollable-panel custom-scrollbar flex flex-col items-center animate-fade-in" style={{ paddingTop: 'max(40px, var(--safe-top))' }}>
                                <h2 className="text-2xl md:text-3xl font-black text-green-400 mb-6 flex items-center gap-2">✨ 미션 결과 정리표 ✨</h2>
                                <p className="text-gray-300 mb-8 text-sm md:text-base">회색 덮개를 <span className="font-bold text-white bg-white/20 px-2 py-1 rounded">클릭</span>하여 숨겨진 정답을 확인해보세요.</p>
                                
                                <div className="w-full max-w-4xl overflow-x-auto rounded-2xl border border-white/20 shadow-2xl bg-black/40 scrollable-panel">
                                    <table className="w-full text-center whitespace-nowrap">
                                        <thead>
                                            <tr className="bg-white/10 text-white">
                                                <th className="p-4 border-b border-r border-white/20">구분</th>
                                                {missions.map((m, i) => <th key={i} className="p-4 border-b border-white/20 text-lg text-blue-300">{m.name}({m.symbol})</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td className="p-4 border-b border-r border-white/20 font-bold bg-white/5 text-gray-300">양성자 수</td>
                                                {missions.map((m, i) => <td key={i} className="p-4 border-b border-white/20 text-red-400 font-mono text-xl">{m.p}</td>)}
                                            </tr>
                                            <tr>
                                                <td className="p-4 border-b border-r border-white/20 font-bold bg-white/5 text-gray-300">전자 수</td>
                                                {missions.map((m, i) => (
                                                    <td key={i} className="p-0 border-b border-white/20 relative w-1/4 h-16">
                                                        <div className="w-full h-full flex items-center justify-center text-cyan-400 font-mono text-xl">{m.e}</div>
                                                        {!revealedCells[`e-${i}`] && (
                                                            <div onClick={()=>revealCell(`e-${i}`)} className="absolute inset-0 bg-slate-700 hover:bg-slate-600 cursor-pointer flex items-center justify-center text-white/80 font-bold transition-colors">클릭</div>
                                                        )}
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr>
                                                <td className="p-4 border-b border-r border-white/20 font-bold bg-white/5 text-gray-300">원자핵 전하량</td>
                                                {missions.map((m, i) => (
                                                    <td key={i} className="p-0 border-b border-white/20 relative w-1/4 h-16">
                                                        <div className="w-full h-full flex items-center justify-center text-red-400 font-mono text-xl">+{m.p}</div>
                                                        {!revealedCells[`cp-${i}`] && (
                                                            <div onClick={()=>revealCell(`cp-${i}`)} className="absolute inset-0 bg-slate-700 hover:bg-slate-600 cursor-pointer flex items-center justify-center text-white/80 font-bold transition-colors">클릭</div>
                                                        )}
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr>
                                                <td className="p-4 border-r border-white/20 font-bold bg-white/5 text-gray-300">전자 전하량</td>
                                                {missions.map((m, i) => (
                                                    <td key={i} className="p-0 border-white/20 relative w-1/4 h-16">
                                                        <div className="w-full h-full flex items-center justify-center text-cyan-400 font-mono text-xl">-{m.e}</div>
                                                        {!revealedCells[`ce-${i}`] && (
                                                            <div onClick={()=>revealCell(`ce-${i}`)} className="absolute inset-0 bg-slate-700 hover:bg-slate-600 cursor-pointer flex items-center justify-center text-white/80 font-bold transition-colors">클릭</div>
                                                        )}
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <button onClick={()=>setSimMode('sandbox')} className="mt-8 glass-button px-8 py-3 rounded-xl font-bold text-white shadow-lg text-lg">자유 탐구로 돌아가기 ↺</button>
                            </div>
                        )}

                        {/* Core Engines Display */}
                        <canvas aria-label="2D 입자 배치 캔버스" ref={canvas2DRef} className={`absolute inset-0 w-full h-full transition-opacity duration-300 touch-none-area ${(simMode === 'sandbox' || simMode === 'mission') && viewMode === '2D' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}></canvas>
                        <div aria-label="3D 원자 모델 뷰어" ref={container3DRef} className={`absolute inset-0 w-full h-full transition-opacity duration-300 touch-none-area ${(simMode === 'sandbox' || simMode === 'mission') && viewMode === '3D' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}></div>
                    </div>
                </div>
            );
        };

        // --- View 3: Report ---
        const ReportView = ({ state, info, setInfo, quizzes, answers, setAnswers, onSubmit, onBack }) => {
            const handleAnswer = (qIdx, isTrue) => {
                const newAnswers = [...answers]; newAnswers[qIdx] = isTrue; setAnswers(newAnswers);
            };
            const isAllAnswered = !answers.includes(null);
            const netCharge = state.protons - state.electrons;
            const elementInfo = getIsotopeInfo(state.protons, state.neutrons);

            return (
                <div className="w-full h-full overflow-y-auto p-4 md:p-8 scrollable-panel custom-scrollbar relative">
                    <div className="max-w-4xl mx-auto space-y-6" style={{ paddingTop: 'max(24px, var(--safe-top))', paddingBottom: 'max(80px, var(--safe-bottom))' }}>
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">실험 결과 보고서</h2>
                            <button onClick={onBack} className="text-gray-400 hover:text-white px-4 py-2 rounded-lg bg-white/5 whitespace-nowrap">← 돌아가기</button>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl">
                            <h3 className="text-xl font-bold text-blue-300 mb-4 flex items-center gap-2">📊 마지막 원자 상태</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                                <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                    <div className="text-gray-400 text-sm mb-1">양성자</div><div className="text-2xl font-mono text-red-400">{state.protons}개</div>
                                </div>
                                <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                    <div className="text-gray-400 text-sm mb-1">전자</div><div className="text-2xl font-mono text-cyan-400">{state.electrons}개</div>
                                </div>
                                <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                    <div className="text-gray-400 text-sm mb-1">전하 상태</div>
                                    <div className={`text-xl font-bold mt-1 ${netCharge>0?'text-red-400':netCharge<0?'text-cyan-400':'text-white'}`}>{netCharge === 0 ? '중성' : (netCharge > 0 ? `+${netCharge} 양이온` : `${netCharge} 음이온`)}</div>
                                </div>
                                <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                    <div className="text-gray-400 text-sm mb-1">최종 원소</div><div className="text-xl font-bold mt-1 text-white">{elementInfo.isotope}</div>
                                </div>
                            </div>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl flex flex-col md:flex-row gap-4">
                            <div className="flex-1">
                                <label className="block text-sm text-gray-400 mb-2">학번</label>
                                <input type="text" placeholder="예: 30101" value={info.studentId} onChange={(e) => setInfo({...info, studentId: e.target.value})} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors" />
                            </div>
                            <div className="flex-1">
                                <label className="block text-sm text-gray-400 mb-2">이름</label>
                                <input type="text" placeholder="홍길동" value={info.studentName} onChange={(e) => setInfo({...info, studentName: e.target.value})} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors" />
                            </div>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl">
                            <label className="block text-sm text-gray-400 mb-2">알게 된 점 (실험을 통해 배운 원자의 구조, 동위원소, 전하량 특징)</label>
                            <textarea rows="3" placeholder="양성자 수를 바꾸니 원소가 달라졌고, 전자 수와 다르면 이온이 됨을 알 수 있었다 등..." value={info.insight} onChange={(e) => setInfo({...info, insight: e.target.value})} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors resize-none scrollable-panel"></textarea>
                        </div>

                        <div className="glass-panel p-6 rounded-2xl">
                            <h3 className="text-xl font-bold text-secondary mb-4 flex items-center gap-2">🧠 개념 확인 퀴즈</h3>
                            <div className="space-y-4">
                                {quizzes.map((q, idx) => (
                                    <div key={idx} className={`p-4 rounded-xl border ${answers[idx] !== null ? (answers[idx] === q.a ? 'bg-green-900/20 border-green-500/50' : 'bg-red-900/20 border-red-500/50') : 'bg-white/5 border-white/10'}`}>
                                        <p className="text-lg mb-3">Q{idx + 1}. {q.q}</p>
                                        <div className="flex gap-2 mb-3">
                                            <button onClick={() => handleAnswer(idx, true)} className={`flex-1 py-2 rounded-lg font-bold text-xl transition-all ${answers[idx] === true ? 'bg-blue-500 text-white' : 'bg-black/40 text-gray-400 hover:bg-black/60'}`}>O</button>
                                            <button onClick={() => handleAnswer(idx, false)} className={`flex-1 py-2 rounded-lg font-bold text-xl transition-all ${answers[idx] === false ? 'bg-blue-500 text-white' : 'bg-black/40 text-gray-400 hover:bg-black/60'}`}>X</button>
                                        </div>
                                        {answers[idx] !== null && (
                                            <div className={`text-sm p-3 rounded-lg ${answers[idx] === q.a ? 'text-green-300 bg-green-500/10' : 'text-red-300 bg-red-500/10'}`}>
                                                {answers[idx] === q.a ? '🎉 정답입니다!' : '❌ 오답입니다.'} <br/><span className="text-gray-300 mt-1 block">해설: {q.explain}</span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={onSubmit} className={`w-full py-4 rounded-xl font-bold text-xl tracking-wider transition-all ${isAllAnswered && info.studentId && info.studentName && info.insight ? 'glass-button text-white shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-gray-700/50 text-gray-500 cursor-not-allowed'}`}>
                            결과 제출하기
                        </button>
                    </div>
                </div>
            );
        };

        // --- View 4: Done ---
        const DoneView = ({ onReset }) => (
            <div className="flex flex-col items-center justify-center p-6 w-full max-w-md text-center animate-fade-in" style={{ paddingBottom: 'max(24px, var(--safe-bottom))' }}>
                <div className="text-7xl mb-6">🚀</div>
                <h2 className="text-3xl font-black text-white mb-4">제출 완료!</h2>
                <p className="text-gray-300 mb-8">원자의 구조와 특성에 대해<br/>성공적으로 탐구했습니다.</p>
                <button onClick={onReset} className="glass-button px-8 py-3 rounded-xl font-bold w-full text-white">다시 실험하기</button>
            </div>
        );

        // Mount App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
